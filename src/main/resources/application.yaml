spring:
  application:
    name: booking-api

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    org.hibernate.SQL: debug

management:
  endpoints:
    web:
      exposure:
        include: health,info

media:
  s3:
    bucket: ${MEDIA_S3_BUCKET:booking-cms-media}
    app-alias: ${MEDIA_S3_APP_ALIAS:booking-api}
    public-prefix: ${MEDIA_S3_PUBLIC_PREFIX:public}
    region: ${MEDIA_S3_REGION:eu-central-1}
    endpoint: ${MEDIA_S3_ENDPOINT:}
    access-key: ${MEDIA_S3_ACCESS_KEY:}
    secret-key: ${MEDIA_S3_SECRET_KEY:}
    path-style-access: ${MEDIA_S3_PATH_STYLE_ACCESS:false}

security:
  jwt:
    expiration-seconds: 3600

payments:
  intent-expiry-scan-ms: ${PAYMENTS_INTENT_EXPIRY_SCAN_MS:60000}

booking:
  public-base-url: ${BOOKING_PUBLIC_BASE_URL:}
